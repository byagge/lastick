<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — внутренняя ошибка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0b1020;
      --muted: #6b7280;
      --accent: #0b1020;
      --bg: #f2f5fb;
      --card: rgba(255, 255, 255, 0.78);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 15%, #ffe4e6 0%, transparent 45%),
        radial-gradient(circle at 85% 0%, #dbeafe 0%, transparent 45%),
        radial-gradient(circle at 30% 90%, #e2e8f0 0%, transparent 50%),
        var(--bg);
    }
    .page {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 28px 24px 32px;
      gap: 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      font-size: 12px;
      color: var(--muted);
      background: var(--card);
      backdrop-filter: blur(12px);
    }
    main {
      display: grid;
      place-items: center;
      text-align: center;
      padding: 16px 0;
    }
    .hero {
      display: grid;
      gap: 20px;
      max-width: 720px;
    }
    .eyebrow {
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.24em;
      color: var(--muted);
    }
    h1 {
      margin: 4px 0 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }
    .big-code {
      font-size: clamp(64px, 18vw, 180px);
      font-weight: 800;
      letter-spacing: -0.06em;
      color: rgba(11, 16, 32, 0.12);
    }
    .actions {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-ghost {
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.12);
      color: var(--ink);
    }
    footer {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }
    @media (min-width: 960px) {
      .page { padding: 40px 64px 48px; }
      .hero { gap: 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a class="brand" href="/">
        <span class="brand-mark">L</span>
        <span>
          <div style="font-weight:700; font-size:14px;">lastick</div>
          <div style="font-size:12px; color:var(--muted);">умная мастерская</div>
        </span>
      </a>
      <span class="badge">Сервис проверяется</span>
    </header>

    <main>
      <section class="hero">
        <div>
          <div class="eyebrow">ошибка 500</div>
          <h1>Внутренняя ошибка</h1>
          <p style="color:var(--muted); font-size:16px; margin:12px 0 0;">
            Мы уже работаем над восстановлением. Обновите страницу или вернитесь позже.
          </p>
        </div>
        <div class="big-code">500</div>
        <div class="actions">
          <button class="btn btn-primary" onclick="location.reload()">Обновить</button>
          <a class="btn btn-ghost" href="/">На главную</a>
          <a class="btn btn-ghost" href="/support/">Сообщить</a>
        </div>
      </section>
    </main>

    <footer>
      <span>Код: 500</span>
      <span>Сделайте скрин для поддержки</span>
    </footer>
  </div>
</body>
</html>
