<!DOCTYPE html>
<html lang="ru" x-data="mobileProducts" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <title>Smart Factory — Продукты</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        body { background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 55%, #e5e7eb 100%); }
        .nav-active { color: #0e121a; }
        .nav-bar { box-shadow: 0 -2px 16px 0 rgba(15,23,42,0.1); }
        .card { box-shadow: 0 2px 12px 0 rgba(15,23,42,0.08); }
        .modal-bg { background: rgba(0,0,0,0.35); }
        .skeleton { background: linear-gradient(90deg, #e0e7ef 25%, #f3f4f6 50%, #e0e7ef 75%); background-size: 200% 100%; animation: skeleton 1.2s infinite linear; }
        @keyframes skeleton { 0% {background-position: 200% 0;} 100% {background-position: -200% 0;} }
        .bg-blue-600 { background-color: #0e121a !important; }
        .text-blue-600 { color: #0e121a !important; }
        .bg-blue-100 { background-color: #e2e8f0 !important; }
        .bg-blue-50 { background-color: #f1f5f9 !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col" style="font-family: system-ui, -apple-system, sans-serif;">
    <!-- AppBar -->
    <header class="fixed top-0 left-0 right-0 z-20 bg-white/90 backdrop-blur border-b border-gray-200 flex items-center justify-between px-4 h-16">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                <span class="text-white font-bold text-2xl">S</span>
            </div>
            <span class="text-lg font-semibold text-gray-900">Продукты</span>
        </div>
        <div class="flex items-center space-x-2">
            <button @click="openAddForm()" class="text-gray-600 hover:text-blue-600" title="Добавить">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 pt-20 pb-20 px-4 max-w-md mx-auto w-full">
        <!-- Search Bar -->
        <div class="relative mb-6">
            <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
            <input type="text" placeholder="Поиск по продуктам..." x-model="searchTerm" class="w-full pl-10 pr-4 py-3 bg-white rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Loading State -->
        <template x-if="loading">
            <div class="space-y-4 animate-pulse">
                <div class="h-20 rounded-xl skeleton"></div>
                <div class="h-20 rounded-xl skeleton"></div>
                <div class="h-20 rounded-xl skeleton"></div>
            </div>
        </template>

        <!-- Products List -->
        <template x-if="!loading">
            <div>
                <template x-if="filteredProducts().length === 0">
                    <div class="text-center py-12">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="package" class="w-10 h-10 text-gray-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-2" x-text="searchTerm ? 'Продукты не найдены' : 'Нет продуктов'"></h3>
                        <p class="text-gray-600" x-text="searchTerm ? 'Попробуйте изменить поисковый запрос.' : 'Добавьте первый продукт.'"></p>
                    </div>
                </template>
                <template x-for="product in filteredProducts()" :key="product.id">
                    <div class="card bg-white rounded-xl p-4 mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <div>
                                <h3 class="font-semibold text-gray-900 text-base" x-text="product.name"></h3>
                                <p class="text-xs text-gray-500" x-text="product.description || 'Без примечания'"></p>
                            </div>
                        </div>
                        <div class="text-sm mb-2"><span class="text-gray-600">Цена:</span> <span class="text-green-700 font-semibold" x-text="product.price + ' сом'"></span></div>
                        <div class="text-sm"><span class="text-gray-600">Себестоимость:</span> <span class="text-blue-700 font-semibold" x-text="product.cost_price + ' сом'"></span></div>
                        <div class="mt-2">
                            <button type="button" @click="toggleVariants(product.id)" class="text-xs text-blue-600">
                                <span x-text="isVariantsOpen(product.id) ? 'Скрыть позиции' : ('Показать позиции (' + ((product.variants || []).length) + ')')"></span>
                            </button>
                            <div x-show="isVariantsOpen(product.id)" class="mt-2">
                                <template x-if="product.variants && product.variants.length">
                                    <div class="flex flex-wrap gap-2">
                                        <template x-for="variant in product.variants" :key="variant.id || (variant.size + '-' + variant.color)">
                                            <span class="text-xs px-2 py-1 rounded-full bg-gray-100 border border-gray-200" x-text="variant.display_name || (product.name + ' (' + [variant.size, variant.color].filter(Boolean).join(', ') + ')')"></span>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="!product.variants || !product.variants.length">
                                    <span class="text-xs text-gray-500">Позиции не добавлены</span>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </main>

        <!-- Bottom Navigation -->
    {% include 'partials/bottom_nav_mobile.html' %}

    <template x-if="showForm">
        <div x-cloak class="fixed inset-0 z-40">
            <div class="absolute inset-0 bg-black bg-opacity-40" @click="closeForm()"></div>
            <div class="fixed right-0 top-0 h-full w-full max-w-md bg-white rounded-l-2xl p-6 overflow-y-auto">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-900" x-text="editingProduct ? 'Редактировать продукт' : 'Добавить продукт'"></h2>
                    <button @click="closeForm()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
                        <i data-lucide="x" class="w-5 h-5 text-gray-600"></i>
                    </button>
                </div>
                <form @submit.prevent="saveProduct()" class="space-y-4">
                    {% csrf_token %}
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Название *</label>
                        <input type="text" x-model="formData.name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Цена (сом) *</label>
                        <input type="number" x-model="formData.price" min="0" step="0.01" placeholder="Введите цену" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900" required>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <button type="button" @click="formData.price = ''" class="px-3 py-1.5 text-xs rounded-full border border-gray-300 text-gray-700">
                                Очистить
                            </button>
                            <button type="button" @click="formData.price = 500" class="px-3 py-1.5 text-xs rounded-full bg-gray-100 text-gray-900">500</button>
                            <button type="button" @click="formData.price = 1000" class="px-3 py-1.5 text-xs rounded-full bg-gray-100 text-gray-900">1000</button>
                            <button type="button" @click="formData.price = 1500" class="px-3 py-1.5 text-xs rounded-full bg-gray-100 text-gray-900">1500</button>
                            <button type="button" @click="formData.price = 2000" class="px-3 py-1.5 text-xs rounded-full bg-gray-100 text-gray-900">2000</button>
                            <button type="button" @click="formData.price = 2500" class="px-3 py-1.5 text-xs rounded-full bg-gray-100 text-gray-900">2500</button>
                            <button type="button" @click="formData.price = 3000" class="px-3 py-1.5 text-xs rounded-full bg-gray-100 text-gray-900">3000</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Примечание</label>
                        <textarea x-model="formData.description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 resize-none"></textarea>
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-medium text-gray-700">Позиции (размер/цвет)</label>
                            <button type="button" @click="addVariantRow()" class="text-xs px-2 py-1 rounded border border-gray-300">+ Добавить</button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="(variant, idx) in formData.variants" :key="idx">
                                <div class="grid grid-cols-12 gap-2 items-center">
                                    <input type="text" x-model="variant.size" placeholder="Размер" class="col-span-5 px-3 py-2 border border-gray-300 rounded-lg">
                                    <input type="text" x-model="variant.color" placeholder="Цвет" class="col-span-5 px-3 py-2 border border-gray-300 rounded-lg">
                                    <button type="button" @click="removeVariantRow(idx)" class="col-span-2 text-red-600 text-sm">✕</button>
                                </div>
                            </template>
                        </div>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <template x-for="quickSize in quickSizes" :key="quickSize">
                                <button type="button" @click="setLastVariantSize(quickSize)" class="text-xs px-2 py-1 rounded-full bg-gray-100 border border-gray-200" x-text="quickSize"></button>
                            </template>
                        </div>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <template x-for="quickColor in quickColors" :key="quickColor">
                                <button type="button" @click="setLastVariantColor(quickColor)" class="text-xs px-2 py-1 rounded-full bg-gray-100 border border-gray-200" x-text="quickColor"></button>
                            </template>
                        </div>
                    </div>
                    <div class="flex justify-end space-x-2 pt-2">
                        <button type="button" @click="closeForm()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700">Отмена</button>
                        <button type="submit" class="px-4 py-2 bg-gray-900 text-white rounded-lg" x-text="editingProduct ? 'Сохранить' : 'Добавить'"></button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <script>
function mobileProducts() {
    return {
        loading: true,
        products: [],
        searchTerm: '',
        showForm: false,
        editingProduct: null,
        expandedProductIds: [],
        quickSizes: ['600', '700', '800', '900', '1000', '1100', '1200', '1300', '1400', '1500'],
        quickColors: ['Белый', 'Черный', 'Серый', 'Бежевый', 'Коричневый'],
        formData: { name: '', type: 'door', description: '', price: '', variants: [{ size: '', color: '' }] },
        async init() {
            this.loading = true;
            try {
                await this.fetchProducts();
            } catch (e) {}
            this.loading = false;
            lucide.createIcons();
        },
        async fetchProducts() {
            this.loading = true;
            try {
                const resp = await fetch('/products/api/products/', { credentials: 'include' });
                const data = await resp.json();
                this.products = Array.isArray(data) ? data : (data.results || []);
            } catch (e) {
                this.products = [];
            }
            this.loading = false;
        },
        getCsrfToken() {
            const name = 'csrftoken';
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')) {
                    return decodeURIComponent(cookie.substring(name.length + 1));
                }
            }
            return '';
        },
        filteredProducts() {
            if (!this.searchTerm) return this.products;
            const term = this.searchTerm.toLowerCase();
            return this.products.filter(p =>
                p.name.toLowerCase().includes(term) ||
                (p.description && p.description.toLowerCase().includes(term))
            );
        },
        openAddForm() {
            this.formData = { name: '', type: 'door', description: '', price: '', variants: [{ size: '', color: '' }] };
            this.editingProduct = null;
            this.showForm = true;
            this.$nextTick(() => lucide.createIcons());
        },
        openEditForm(product) {
            this.formData = {
                id: product.id,
                name: product.name,
                type: product.type,
                description: product.description,
                price: product.price,
                variants: (product.variants && product.variants.length)
                    ? product.variants.map(v => ({ size: v.size || '', color: v.color || '' }))
                    : [{ size: '', color: '' }]
            };
            this.editingProduct = product;
            this.showForm = true;
            this.$nextTick(() => lucide.createIcons());
        },
        closeForm() {
            this.showForm = false;
            this.formData = { name: '', type: 'door', description: '', price: '', variants: [{ size: '', color: '' }] };
            this.editingProduct = null;
            this.$nextTick(() => lucide.createIcons());
        },
        async saveProduct() {
            this.loading = true;
            if (this.formData.price === '' || this.formData.price === null || typeof this.formData.price === 'undefined') {
                this.loading = false;
                return;
            }
            const method = this.editingProduct ? 'PUT' : 'POST';
            const url = this.editingProduct ? `/products/api/products/${this.formData.id}/` : '/products/api/products/';
            const body = JSON.stringify({
                name: this.formData.name,
                type: this.formData.type,
                description: this.formData.description,
                price: Number(this.formData.price),
                variants: (this.formData.variants || []).filter(v => (v.size || '').trim() || (v.color || '').trim())
            });
            try {
                const resp = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': this.getCsrfToken()
                    },
                    body: body,
                    credentials: 'include'
                });
                if (resp.ok) {
                    await this.fetchProducts();
                    this.closeForm();
                } else if (resp.status === 403) {
                    alert('Доступ запрещен. Создавать/изменять могут только admin или accountant.');
                }
            } catch (e) {}
            this.loading = false;
        },
        async deleteProduct(id) {
            if (!confirm('Удалить продукт?')) return;
            this.loading = true;
            try {
                const resp = await fetch(`/products/api/products/${id}/`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': this.getCsrfToken() },
                    credentials: 'include'
                });
                if (resp.ok) {
                    await this.fetchProducts();
                } else if (resp.status === 403) {
                    alert('Доступ запрещен. Удалять могут только admin или accountant.');
                }
            } catch (e) {}
            this.loading = false;
        },
        isVariantsOpen(productId) {
            return this.expandedProductIds.includes(productId);
        },
        toggleVariants(productId) {
            if (this.isVariantsOpen(productId)) {
                this.expandedProductIds = this.expandedProductIds.filter(id => id !== productId);
            } else {
                this.expandedProductIds.push(productId);
            }
        },
        addVariantRow() {
            this.formData.variants.push({ size: '', color: '' });
        },
        removeVariantRow(index) {
            this.formData.variants.splice(index, 1);
            if (!this.formData.variants.length) this.formData.variants.push({ size: '', color: '' });
        },
        setLastVariantSize(size) {
            if (!this.formData.variants.length) this.addVariantRow();
            this.formData.variants[this.formData.variants.length - 1].size = size;
        },
        setLastVariantColor(color) {
            if (!this.formData.variants.length) this.addVariantRow();
            this.formData.variants[this.formData.variants.length - 1].color = color;
        }
    };
}
document.addEventListener('alpine:init', () => {
    Alpine.data('mobileProducts', mobileProducts);
});
document.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
});
</script>
</body>
</html>
