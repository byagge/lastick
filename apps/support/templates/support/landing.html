<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поддержка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0b1020;
      --muted: #6b7280;
      --accent: #0b1020;
      --bg: #f2f5fb;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 12% 8%, #dbeafe 0%, transparent 45%),
        radial-gradient(circle at 88% 12%, #fee2e2 0%, transparent 45%),
        radial-gradient(circle at 35% 90%, #e2e8f0 0%, transparent 50%),
        var(--bg);
    }
    .page {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 28px 24px 32px;
      gap: 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    main {
      display: grid;
      place-items: center;
      text-align: center;
      padding: 12px 0;
    }
    h1 {
      margin: 8px 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
    }
    .lead {
      color: var(--muted);
      font-size: 16px;
      margin: 0 auto;
      max-width: 640px;
    }
    .contacts {
      margin-top: 28px;
      display: grid;
      gap: 12px;
      justify-items: center;
    }
    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: rgba(255, 255, 255, 0.9);
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
    }
    footer {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }
    @media (min-width: 960px) {
      .page { padding: 40px 64px 48px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a class="brand" href="/">
        <span class="brand-mark">L</span>
        <span>
          <div style="font-weight:700; font-size:14px;">lastick</div>
          <div style="font-size:12px; color:var(--muted);">умная мастерская</div>
        </span>
      </a>
      <span style="font-size:12px; color:var(--muted);">Поддержка</span>
    </header>

    <main>
      <div>
        <div style="text-transform:uppercase; font-size:11px; letter-spacing:0.24em; color:var(--muted);">связь с нами</div>
        <h1>Служба поддержки</h1>
        <p class="lead">Если возникла ошибка или нужен быстрый ответ, напишите нам удобным способом.</p>
        <div class="contacts">
          <a class="contact-link" href="mailto:support@zappis.app">support@zappis.app</a>
          <a class="contact-link" href="https://t.me/JustBeYourselfNow" target="_blank" rel="noreferrer">Telegram: @JustBeYourselfNow</a>
        </div>
        <div class="hint">Обычно отвечаем в течение рабочего дня.</div>
      </div>
    </main>

    <footer>
      <span>lastick support</span>
      <a href="/" style="color:inherit; text-decoration:none;">На главную</a>
    </footer>
  </div>
</body>
</html>
